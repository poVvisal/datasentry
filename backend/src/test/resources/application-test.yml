# Test profile – Testcontainers wires the datasource automatically via @ServiceConnection.
# Flyway runs against the real container; H2 is intentionally excluded.
spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: false

logging:
  level:
    org.flywaydb: INFO
    dev.datasentry: WARN
