# Profile: local
# Activated by SPRING_PROFILES_ACTIVE=local or -Dspring.profiles.active=local
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/datasentry}
    username: ${DB_USER:datasentry}
    password: ${DB_PASS:change_me_locally}
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.flywaydb: DEBUG
    org.hibernate.SQL: DEBUG
